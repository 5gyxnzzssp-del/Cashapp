<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash App - QR Code</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #00d400;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .qr-section {
            background: #f5f5f5;
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            border: 2px solid #e0e0e0;
        }

        .qr-image {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .instructions {
            margin: 30px 0;
            text-align: left;
            background: #f0f8ff;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #00d400;
        }

        .instructions h2 {
            color: #00d400;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .instructions ol {
            margin-left: 20px;
            color: #333;
            line-height: 1.8;
        }

        .instructions li {
            margin-bottom: 10px;
        }

        .footer {
            color: #999;
            font-size: 0.9em;
            margin-top: 30px;
            border-top: 1px solid #e0e0e0;
            padding-top: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .qr-section {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Cash App</h1>
        <p class="subtitle">Scan to Connect</p>

        <div class="qr-section">
            <img src="cashapp-qr-code.png" alt="Cash App QR Code" class="qr-image">
        </div>

        <div class="instructions">
            <h2>How to Use</h2>
            <ol>
                <li>Open your phone's camera or a QR code scanner app</li>
                <li>Point at the QR code above</li>
                <li>Tap the notification that appears</li>
                <li>Follow the prompts to connect with Cash App</li>
            </ol>
        </div>

        <div class="footer">
            <p>🔒 Safe and secure. Made with ❤️ using Cash App</p>
        </div>
    </div>
</body>
</html>
